name: Frontend CI
run-name: ${{ github.actor }} is testing the frontend 🚀

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.setup-node.outputs.cache-key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: package-lock.json

  build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js and restore cache
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js project
        run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js and restore cache
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Lint code
        run: npm run lint

  deploy-frontend-image:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Yandex Cloud Container Registry
        uses: yc-actions/yc-cr-login@v1 # Использование готового действия для авторизации:cite[2]
        with:
          yc-sa-credentials: ${{ secrets.YC_CREDENTIALS }} # Передаем учетные данные

      - name: Build and tag Docker image
        run: |
          COMMIT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          docker build -t ${{ secrets.YC_REGISTRY }}/my-frontend-app:$COMMIT_SHA -f path/to/Dockerfile .        

      - name: Push Docker image
        run: docker push ${{ secrets.YC_REGISTRY }}/my-frontend-app:$COMMIT_SHA